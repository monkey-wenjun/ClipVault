# 可选，将显示在 GitHub 存储库的"操作"选项卡中的工作流名称
name: Release CI

# 指定此工作流的触发器
on:
  push:
    # 匹配特定标签 (refs/tags)
    tags:
      - "v*" # 推送事件匹配 v*, 例如 v1.0，v20.15.10 等来触发工作流
  workflow_dispatch:

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set output
        id: vars
        run: echo "tag=${GITHUB_REF#refs/*/}" >> $GITHUB_OUTPUT

      # 安装 Node.js
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 发布 Release，使用自定义名称
      - name: Generate changelog
        id: create_release
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/*/}
          else
            TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          fi
          echo "Using tag: $TAG"
          npx changelogithub --draft --name "$TAG"
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

  # 编译 Tauri
  build-app:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            target: "aarch64-apple-darwin"
          - platform: "macos-latest"
            target: "x86_64-apple-darwin"

          - platform: "windows-latest"
            target: "x86_64-pc-windows-msvc"
          - platform: "windows-latest"
            target: "i686-pc-windows-msvc"
          - platform: "windows-latest"
            target: "aarch64-pc-windows-msvc"

          - platform: "ubuntu-22.04"
            target: "x86_64-unknown-linux-gnu"
          - platform: "ubuntu-22.04"
            target: "aarch64-unknown-linux-gnu"

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v3
        with:
          version: latest

      # 安装 Rust（必须先于添加 target）
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install ARM cross-compile dependencies (ubuntu only)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          # 安装交叉编译工具链
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          # 安装 OpenSSL 开发包 (用于头文件和库)
          sudo apt-get install -y libssl-dev
          
          # 查找系统上所有的 OpenSSL 相关文件
          echo "=== Searching for OpenSSL files ==="
          find /usr -name "opensslconf.h" 2>/dev/null
          find /usr -name "configuration.h" 2>/dev/null
          find /usr -name "libssl.so*" 2>/dev/null
          find /usr -name "libcrypto.so*" 2>/dev/null
          
          # 创建交叉编译目录结构
          sudo mkdir -p /usr/aarch64-linux-gnu/include/openssl
          sudo mkdir -p /usr/aarch64-linux-gnu/lib
          
          # 方法1: 尝试使用 pkg-config 获取正确的路径
          PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig pkg-config --cflags openssl 2>/dev/null || true
          PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig pkg-config --libs openssl 2>/dev/null || true
          
          # 方法2: 手动设置 - 复制所有 OpenSSL 头文件
          # 首先复制主头文件目录
          if [ -d /usr/include/openssl ]; then
            sudo cp -r /usr/include/openssl/* /usr/aarch64-linux-gnu/include/openssl/
            echo "Copied main OpenSSL headers"
          fi
          
          # 查找并复制架构特定的头文件 (包括 configuration.h)
          # 这些文件可能在不同位置
          for arch_dir in x86_64-linux-gnu aarch64-linux-gnu; do
            if [ -d /usr/include/$arch_dir/openssl ]; then
              echo "Copying arch-specific headers from /usr/include/$arch_dir/openssl/"
              sudo cp -r /usr/include/$arch_dir/openssl/* /usr/aarch64-linux-gnu/include/openssl/ 2>/dev/null || true
            fi
          done
          
          # 查找并复制任何生成的 configuration.h
          for conf_file in $(find /usr -name "configuration.h" -path "*openssl*" 2>/dev/null); do
            echo "Found configuration.h at: $conf_file"
            sudo cp "$conf_file" /usr/aarch64-linux-gnu/include/openssl/ 2>/dev/null || true
          done
          
          # 复制库文件
          if [ -d /usr/lib/aarch64-linux-gnu ]; then
            sudo cp /usr/lib/aarch64-linux-gnu/libssl.so* /usr/aarch64-linux-gnu/lib/ 2>/dev/null || true
            sudo cp /usr/lib/aarch64-linux-gnu/libcrypto.so* /usr/aarch64-linux-gnu/lib/ 2>/dev/null || true
          fi
          
          # 验证关键文件
          echo "=== Verifying OpenSSL setup ==="
          echo "Headers in /usr/aarch64-linux-gnu/include/openssl/:"
          ls -la /usr/aarch64-linux-gnu/include/openssl/ 2>/dev/null || echo "Directory empty or not found"
          
          echo "Checking for critical files:"
          ls -la /usr/aarch64-linux-gnu/include/openssl/opensslconf.h 2>/dev/null || echo "opensslconf.h missing!"
          ls -la /usr/aarch64-linux-gnu/include/openssl/configuration.h 2>/dev/null || echo "configuration.h missing!"
          ls -la /usr/aarch64-linux-gnu/include/openssl/opensslv.h 2>/dev/null || echo "opensslv.h missing!"

      # 使用 Rust 缓存，加快安装速度
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri/target
          key: ${{ matrix.target }}

      # 获取 pnpm 缓存
      - name: Sync node version and setup cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # 安装依赖
      - name: Install app dependencies
        run: pnpm install --frozen-lockfile

      # 构建前端（添加环境变量避免内存问题）
      - name: Build frontend
        run: pnpm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      # 设置交叉编译环境变量（ARM Linux）
      - name: Setup ARM cross-compile env
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> $GITHUB_ENV
          echo "PKG_CONFIG_SYSROOT_DIR=/" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
          # 设置 OpenSSL 环境变量 - 使用交叉编译目录结构
          echo "OPENSSL_DIR=/usr/aarch64-linux-gnu" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=/usr/aarch64-linux-gnu/include" >> $GITHUB_ENV
          echo "OPENSSL_LIB_DIR=/usr/lib/aarch64-linux-gnu" >> $GITHUB_ENV
          # 同时设置目标特定的环境变量
          echo "AARCH64_UNKNOWN_LINUX_GNU_OPENSSL_DIR=/usr/aarch64-linux-gnu" >> $GITHUB_ENV
          echo "AARCH64_UNKNOWN_LINUX_GNU_OPENSSL_INCLUDE_DIR=/usr/aarch64-linux-gnu/include" >> $GITHUB_ENV
          echo "AARCH64_UNKNOWN_LINUX_GNU_OPENSSL_LIB_DIR=/usr/lib/aarch64-linux-gnu" >> $GITHUB_ENV

      # 执行构建，以及推送 github release
      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          CI: false
          PLATFORM: ${{ matrix.platform }}
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ClipVault ${{ github.ref_name }}"
          releaseBody: ""
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
