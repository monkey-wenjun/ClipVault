# 可选，将显示在 GitHub 存储库的"操作"选项卡中的工作流名称
name: Release CI

# 指定此工作流的触发器
on:
  push:
    # 匹配特定标签 (refs/tags)
    tags:
      - "v*" # 推送事件匹配 v*, 例如 v1.0，v20.15.10 等来触发工作流
  workflow_dispatch:

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set output
        id: vars
        run: echo "tag=${GITHUB_REF#refs/*/}" >> $GITHUB_OUTPUT

      # 安装 Node.js
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 发布 Release，使用自定义名称
      - name: Generate changelog
        id: create_release
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/*/}
          else
            TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          fi
          echo "Using tag: $TAG"
          npx changelogithub --draft --name "$TAG"
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

  # 编译 Tauri
  build-app:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            target: "aarch64-apple-darwin"
          - platform: "macos-latest"
            target: "x86_64-apple-darwin"

          - platform: "windows-latest"
            target: "x86_64-pc-windows-msvc"
          - platform: "windows-latest"
            target: "i686-pc-windows-msvc"
          - platform: "windows-latest"
            target: "aarch64-pc-windows-msvc"

          - platform: "ubuntu-22.04"
            target: "x86_64-unknown-linux-gnu"
          - platform: "ubuntu-22.04"
            target: "aarch64-unknown-linux-gnu"

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v3
        with:
          version: latest

      # 安装 Rust（必须先于添加 target）
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install ARM cross-compile dependencies (ubuntu only)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo dpkg --add-architecture arm64
          # 为 ARM64 配置 ports.ubuntu.com 源
          sudo sed -i 's|http://archive.ubuntu.com/ubuntu/|http://ports.ubuntu.com/ubuntu-ports/|g' /etc/apt/sources.list
          sudo sed -i 's|http://security.ubuntu.com/ubuntu/|http://ports.ubuntu.com/ubuntu-ports/|g' /etc/apt/sources.list
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          # 安装 OpenSSL 和 ARM64 库 (关键！不能失败)
          sudo apt-get install -y libssl-dev:arm64
          sudo apt-get install -y libwebkit2gtk-4.1-dev:arm64 libappindicator3-dev:arm64 librsvg2-dev:arm64 patchelf || true
          
          # 验证 OpenSSL 头文件位置
          echo "=== Checking OpenSSL header locations ==="
          echo "--- /usr/include/openssl/ ---"
          ls -la /usr/include/openssl/ 2>/dev/null || echo "Not found"
          echo "--- /usr/include/aarch64-linux-gnu/openssl/ ---"
          ls -la /usr/include/aarch64-linux-gnu/openssl/ 2>/dev/null || echo "Not found"
          echo "--- /usr/aarch64-linux-gnu/include/openssl/ ---"
          ls -la /usr/aarch64-linux-gnu/include/openssl/ 2>/dev/null || echo "Not found"
          
          # 创建完整的 OpenSSL 头文件目录结构
          sudo mkdir -p /usr/aarch64-linux-gnu/include/openssl
          
          # 复制主 openssl 头文件 (从 x86_64 位置)
          if [ -d /usr/include/openssl ]; then
            sudo cp -r /usr/include/openssl/* /usr/aarch64-linux-gnu/include/openssl/
            echo "Copied headers from /usr/include/openssl/"
          fi
          
          # 复制架构特定的 opensslconf.h (关键文件！优先从 arm64 位置复制)
          if [ -f /usr/include/aarch64-linux-gnu/openssl/opensslconf.h ]; then
            sudo cp /usr/include/aarch64-linux-gnu/openssl/opensslconf.h /usr/aarch64-linux-gnu/include/openssl/
            echo "Copied architecture-specific opensslconf.h from /usr/include/aarch64-linux-gnu/openssl/"
          elif [ -f /usr/aarch64-linux-gnu/include/openssl/opensslconf.h ]; then
            echo "opensslconf.h already exists in target location"
          else
            echo "ERROR: Could not find opensslconf.h for ARM64!"
            # 尝试查找文件位置
            find /usr -name "opensslconf.h" 2>/dev/null || true
            exit 1
          fi
          
          # 验证最终目录结构
          echo "=== Final /usr/aarch64-linux-gnu/include/openssl/ contents ==="
          ls -la /usr/aarch64-linux-gnu/include/openssl/ || true
          echo "=== Verifying opensslconf.h exists ==="
          ls -la /usr/aarch64-linux-gnu/include/openssl/opensslconf.h || (echo "ERROR: opensslconf.h not found!" && exit 1)

      # 使用 Rust 缓存，加快安装速度
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri/target
          key: ${{ matrix.target }}

      # 获取 pnpm 缓存
      - name: Sync node version and setup cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # 安装依赖
      - name: Install app dependencies
        run: pnpm install --frozen-lockfile

      # 构建前端（添加环境变量避免内存问题）
      - name: Build frontend
        run: pnpm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      # 设置交叉编译环境变量（ARM Linux）
      - name: Setup ARM cross-compile env
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> $GITHUB_ENV
          echo "PKG_CONFIG_SYSROOT_DIR=/" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
          # 设置 OpenSSL 环境变量 - 使用交叉编译目录结构
          echo "OPENSSL_DIR=/usr/aarch64-linux-gnu" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=/usr/aarch64-linux-gnu/include" >> $GITHUB_ENV
          echo "OPENSSL_LIB_DIR=/usr/lib/aarch64-linux-gnu" >> $GITHUB_ENV
          # 同时设置目标特定的环境变量
          echo "AARCH64_UNKNOWN_LINUX_GNU_OPENSSL_DIR=/usr/aarch64-linux-gnu" >> $GITHUB_ENV
          echo "AARCH64_UNKNOWN_LINUX_GNU_OPENSSL_INCLUDE_DIR=/usr/aarch64-linux-gnu/include" >> $GITHUB_ENV
          echo "AARCH64_UNKNOWN_LINUX_GNU_OPENSSL_LIB_DIR=/usr/lib/aarch64-linux-gnu" >> $GITHUB_ENV

      # 执行构建，以及推送 github release
      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          CI: false
          PLATFORM: ${{ matrix.platform }}
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ClipVault ${{ github.ref_name }}"
          releaseBody: ""
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
