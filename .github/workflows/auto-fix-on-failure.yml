# 当 GitHub Actions 失败时自动分析并提供修复建议
name: Auto Fix on Failure

on:
  workflow_run:
    workflows: ["Release CI", "Beta Build"]
    types:
      - completed

jobs:
  analyze-failure:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download workflow logs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p .github/logs
          gh run view ${{ github.event.workflow_run.id }} --log > .github/logs/failed-run.log || true

      - name: Analyze logs and generate fix suggestions
        run: |
          node scripts/auto-fix.js .github/logs/failed-run.log > .github/logs/fix-suggestions.md || true

      - name: Upload analysis results
        uses: actions/upload-artifact@v4
        with:
          name: failure-analysis
          path: |
            .github/logs/failed-run.log
            .github/logs/fix-suggestions.md

      - name: Create issue with fix suggestions
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const logPath = '.github/logs/fix-suggestions.md';
            
            let body = '## 🔧 GitHub Actions 构建失败分析\n\n';
            body += `**工作流**: ${{ github.event.workflow_run.name }}\n`;
            body += `**运行ID**: ${{ github.event.workflow_run.id }}\n`;
            body += `**提交**: ${{ github.event.workflow_run.head_commit.message }}\n\n`;
            
            if (fs.existsSync(logPath)) {
              const suggestions = fs.readFileSync(logPath, 'utf-8');
              body += '## 问题分析与修复建议\n\n';
              body += '```\n' + suggestions + '\n```\n\n';
            }
            
            body += '---\n';
            body += '💡 此 Issue 由自动修复助手创建，可安全关闭。';
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔧 构建失败: ${{ github.event.workflow_run.name }} - ${new Date().toISOString().split('T')[0]}`,
              body: body,
              labels: ['bug', 'ci/cd', 'auto-generated']
            });
