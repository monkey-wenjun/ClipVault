"$schema" = "schemas/schema.json"

[default]
description = "Default permissions for the image hosting plugin"
permissions = [
    "allow-upload-image",
    "allow-upload-image-to-default",
    "allow-encrypt-config",
    "allow-decrypt-config",
]

[[permission]]
identifier = "allow-upload-image"
description = "Allows uploading images to image hosting"
commands.allow = ["upload_image"]

[[permission]]
identifier = "allow-upload-image-to-default"
description = "Allows uploading images to default image hosting"
commands.allow = ["upload_image_to_default"]

[[permission]]
identifier = "allow-encrypt-config"
description = "Allows encrypting image hosting config"
commands.allow = ["encrypt_image_hosting_config"]

[[permission]]
identifier = "allow-decrypt-config"
description = "Allows decrypting image hosting config"
commands.allow = ["decrypt_image_hosting_config"]
